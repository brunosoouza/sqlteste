name: Validate today's database SQL files and expose contents URLs

on:
  push:
    paths:
      - 'database/**/*.sql'
  pull_request:
    paths:
      - 'database/**/*.sql'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-collect:
    runs-on: ubuntu-latest

    outputs:
      sql_files: ${{ steps.collect.outputs.sql_files }}
      content_urls: ${{ steps.collect.outputs.content_urls }}
      jira_tickets: ${{ steps.collect.outputs.jira_tickets }}
      items: ${{ steps.collect.outputs.items }}
      first_sql_file: ${{ steps.collect.outputs.first_sql_file }}
      first_content_url: ${{ steps.collect.outputs.first_content_url }}
      first_jira_ticket: ${{ steps.collect.outputs.first_jira_ticket }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changed SQL files and build outputs
        id: collect
        shell: bash
        env:
          TZ: America/Sao_Paulo
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          TODAY="$(date +%F)"

          echo "Data atual considerada: $TODAY"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Comparando: $BASE_SHA -> $HEAD_SHA"

          mapfile -t SQL_FILES < <(
            git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" \
              | grep -E '^database/.+\.sql$' || true
          )

          if [ "${#SQL_FILES[@]}" -eq 0 ]; then
            echo "Nenhum arquivo .sql alterado em database/."
            echo 'sql_files=[]' >> "$GITHUB_OUTPUT"
            echo 'content_urls=[]' >> "$GITHUB_OUTPUT"
            echo 'jira_tickets=[]' >> "$GITHUB_OUTPUT"
            echo 'items=[]' >> "$GITHUB_OUTPUT"
            echo 'first_sql_file=' >> "$GITHUB_OUTPUT"
            echo 'first_content_url=' >> "$GITHUB_OUTPUT"
            echo 'first_jira_ticket=' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TMP_ITEMS="$(mktemp)"
          TMP_TICKETS="$(mktemp)"
          TMP_FILES="$(mktemp)"
          TMP_URLS="$(mktemp)"

          for file in "${SQL_FILES[@]}"; do
            echo "Validando arquivo: $file"

            # Estrutura obrigatória:
            # database/YYYY-MM-DD/TICKETJIRA-nomeDoArquivo.sql
            if [[ ! "$file" =~ ^database/([0-9]{4}-[0-9]{2}-[0-9]{2})/([^/]+)\.sql$ ]]; then
              echo "::error file=$file::Estrutura inválida. Use database/YYYY-MM-DD/TICKETJIRA-nomeDoArquivo.sql"
              exit 1
            fi

            folder_date="${BASH_REMATCH[1]}"
            file_name_no_ext="${BASH_REMATCH[2]}"
            file_name="$(basename "$file")"

            # A pasta precisa ser exatamente a data atual
            if [[ "$folder_date" != "$TODAY" ]]; then
              echo "::error file=$file::Arquivo fora da pasta do dia atual. Esperado: database/$TODAY/"
              exit 1
            fi

            # Nome do arquivo: ABC-123-descricao.sql
            if [[ ! "$file_name" =~ ^([A-Z][A-Z0-9]+-[0-9]+)-([a-zA-Z0-9._-]+)\.sql$ ]]; then
              echo "::error file=$file::Nome inválido. Use o padrão TICKETJIRA-nomeDoArquivo.sql, por exemplo ABC-123-cria-tabela.sql"
              exit 1
            fi

            jira_ticket="${BASH_REMATCH[1]}"
            content_url="https://api.github.com/repos/$REPO/contents/$file?ref=$SHA"

            printf '%s\n' "$file" >> "$TMP_FILES"
            printf '%s\n' "$jira_ticket" >> "$TMP_TICKETS"
            printf '%s\n' "$content_url" >> "$TMP_URLS"

            jq -nc \
              --arg file "$file" \
              --arg jira_ticket "$jira_ticket" \
              --arg content_url "$content_url" \
              '{file:$file,jira_ticket:$jira_ticket,content_url:$content_url}' >> "$TMP_ITEMS"
          done

          SQL_FILES_JSON=$(jq -R . < "$TMP_FILES" | jq -s -c .)
          JIRA_TICKETS_JSON=$(jq -R . < "$TMP_TICKETS" | jq -s -c .)
          CONTENT_URLS_JSON=$(jq -R . < "$TMP_URLS" | jq -s -c .)
          ITEMS_JSON=$(jq -s -c . "$TMP_ITEMS")

          FIRST_SQL_FILE="$(head -n 1 "$TMP_FILES")"
          FIRST_JIRA_TICKET="$(head -n 1 "$TMP_TICKETS")"
          FIRST_CONTENT_URL="$(head -n 1 "$TMP_URLS")"

          echo "sql_files=$SQL_FILES_JSON" >> "$GITHUB_OUTPUT"
          echo "jira_tickets=$JIRA_TICKETS_JSON" >> "$GITHUB_OUTPUT"
          echo "content_urls=$CONTENT_URLS_JSON" >> "$GITHUB_OUTPUT"
          echo "items=$ITEMS_JSON" >> "$GITHUB_OUTPUT"
          echo "first_sql_file=$FIRST_SQL_FILE" >> "$GITHUB_OUTPUT"
          echo "first_jira_ticket=$FIRST_JIRA_TICKET" >> "$GITHUB_OUTPUT"
          echo "first_content_url=$FIRST_CONTENT_URL" >> "$GITHUB_OUTPUT"

      - name: Show outputs
        run: |
          echo "Arquivos SQL:     ${{ steps.collect.outputs.sql_files }}"
          echo "Tickets Jira:     ${{ steps.collect.outputs.jira_tickets }}"
          echo "Contents URLs:    ${{ steps.collect.outputs.content_urls }}"
          echo "Itens combinados: ${{ steps.collect.outputs.items }}"
